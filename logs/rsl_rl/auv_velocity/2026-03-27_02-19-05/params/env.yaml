seed: 42
sim:
  nconmax: 1024
  njmax: 2048
  ls_parallel: true
  contact_sensor_maxmatch: 128
  mujoco:
    timestep: 0.005
    integrator: implicitfast
    impratio: 1.0
    cone: pyramidal
    jacobian: auto
    solver: newton
    iterations: 10
    tolerance: 1.0e-08
    ls_iterations: 20
    ls_tolerance: 0.01
    ccd_iterations: 50
    gravity: !!python/tuple
    - 0.0
    - 0.0
    - -9.81
    multiccd: false
  nan_guard:
    enabled: false
    buffer_size: 100
    output_dir: /tmp/mjlab/nan_dumps
    max_envs_to_dump: 5
viewer:
  lookat: !!python/tuple
  - 0.0
  - 0.0
  - 0.0
  distance: 2.5
  fovy: null
  elevation: -15.0
  azimuth: 90.0
  origin_type: !!python/object/apply:mjlab.viewer.viewer_config.OriginType
  - 4
  entity_name: robot
  body_name: base
  env_idx: 0
  max_extra_envs: 2
  enable_reflections: true
  enable_shadows: true
  height: 240
  width: 320
episode_length_s: 20.0
rewards:
  action_rate_l2:
    func: !!python/name:mjlab.envs.mdp.rewards.action_rate_l2 ''
    params: {}
    weight: -0.01
terminations:
  time_out:
    func: !!python/name:mjlab.envs.mdp.terminations.time_out ''
    params: {}
    time_out: true
commands:
  twist:
    resampling_time_range: !!python/tuple
    - 3.0
    - 8.0
    debug_vis: true
    entity_name: robot
    heading_command: true
    heading_control_stiffness: 0.5
    rel_standing_envs: 0.1
    rel_heading_envs: 0.3
    init_velocity_prob: 0.0
    ranges:
      lin_vel_x: !!python/tuple
      - -1.0
      - 1.0
      lin_vel_y: !!python/tuple
      - -1.0
      - 1.0
      ang_vel_z: !!python/tuple
      - -0.5
      - 0.5
      heading: !!python/tuple
      - -3.141592653589793
      - 3.141592653589793
    viz:
      z_offset: 0.2
      scale: 0.5
curriculum:
  command_vel:
    func: !!python/name:mjlab.tasks.velocity.mdp.curriculums.commands_vel ''
    params:
      command_name: twist
      velocity_stages:
      - step: 0
        lin_vel_x: !!python/tuple
        - -1.0
        - 1.0
        ang_vel_z: !!python/tuple
        - -0.5
        - 0.5
      - step: 120000
        lin_vel_x: !!python/tuple
        - -1.5
        - 2.0
        ang_vel_z: !!python/tuple
        - -0.7
        - 0.7
      - step: 240000
        lin_vel_x: !!python/tuple
        - -2.0
        - 3.0
metrics:
  mean_action_acc:
    func: !!python/name:mjlab.envs.mdp.metrics.mean_action_acc ''
    params: {}
is_finite_horizon: false
scale_rewards_by_dt: true
